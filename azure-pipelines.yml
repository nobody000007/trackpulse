trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
  - group: trackpulse-vars

steps:
  - task: Docker@2
    displayName: Build and push image to ACR
    inputs:
      command: buildAndPush
      repository: trackpulse
      dockerfile: Dockerfile
      containerRegistry: acr-service-connection
      tags: latest
      arguments: --build-arg NEXT_PUBLIC_APP_URL=$(NEXT_PUBLIC_APP_URL)

  - task: AzureWebAppContainer@1
    displayName: Deploy to Azure Container App Service
    inputs:
      azureSubscription: azure-service-connection
      appName: $(AZURE_CONTAINER_WEBAPP_NAME)
      containers: $(ACR_LOGIN_SERVER)/trackpulse:latest
