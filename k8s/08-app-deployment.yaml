apiVersion: apps/v1
kind: Deployment
metadata:
  name: trackpulse
  namespace: trackpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trackpulse
  template:
    metadata:
      labels:
        app: trackpulse
    spec:
      # Wait for postgres to be reachable before starting the app
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres-service 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready!"

      containers:
        - name: trackpulse
          image: localhost:5000/trackpulse:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          # ---- Non-sensitive config from ConfigMap ----
          envFrom:
            - configMapRef:
                name: trackpulse-config

          # ---- Sensitive config from Secret ----
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: trackpulse-secrets
                  key: DATABASE_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: trackpulse-secrets
                  key: NEXTAUTH_SECRET
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: trackpulse-secrets
                  key: GROQ_API_KEY
            - name: GMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: trackpulse-secrets
                  key: GMAIL_USER
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: trackpulse-secrets
                  key: GMAIL_APP_PASSWORD
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: trackpulse-secrets
                  key: AZURE_STORAGE_CONNECTION_STRING

          # Health checks — Kubernetes uses these to know if the app is running
          readinessProbe:
            httpGet:
              path: /                       # Hit the homepage to check if the app is ready to receive traffic
              port: 8080
            initialDelaySeconds: 15        # Wait 15s after start before first check
            periodSeconds: 10              # Check every 10s
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30        # Give Next.js time to fully start
            periodSeconds: 20
            failureThreshold: 3

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
