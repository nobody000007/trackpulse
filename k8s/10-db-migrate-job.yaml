apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: trackpulse
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do sleep 2; done
      containers:
        - name: migrate
          image: localhost:5000/trackpulse:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - npx --yes prisma@5.14.0 db push
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: trackpulse-secrets
                  key: DATABASE_URL
