apiVersion: v1
kind: Service
metadata:
  name: postgres-service        # This name becomes the hostname: postgres-service.trackpulse.svc.cluster.local
  namespace: trackpulse
spec:
  selector:
    app: postgres               # Routes traffic to pods with the label app=postgres
  ports:
    - port: 5432                # Port other pods use to connect
      targetPort: 5432          # Port on the postgres pod
  type: ClusterIP               # Only accessible inside the cluster (not from your browser)
