trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**
      - pipelines/terraform-pipeline.yml

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod

variables:
  - group: trackpulse-secrets
  - name: workingDir
    value: $(System.DefaultWorkingDirectory)\terraform\environments\${{ parameters.environment }}

stages:

# ─── Stage 1: Plan ────────────────────────────────────────────────────────────
- stage: Plan
  displayName: "Terraform Plan (${{ parameters.environment }})"
  jobs:
  - job: TerraformPlan
    displayName: "Plan"
    pool:
      name: local-agent

    steps:
    - task: AzureCLI@2
      displayName: "Terraform Init & Plan"
      inputs:
        azureSubscription: azure-service-connection
        scriptType: ps
        scriptLocation: inlineScript
        workingDirectory: $(workingDir)
        addSpnToEnvironment: true
        inlineScript: |
          $env:ARM_CLIENT_ID       = $env:servicePrincipalId
          $env:ARM_CLIENT_SECRET   = $env:servicePrincipalKey
          $env:ARM_TENANT_ID       = $env:tenantId
          $env:ARM_SUBSCRIPTION_ID = (az account show --query id -o tsv)

          # Remove stale .terraform state to guarantee a clean init
          if (Test-Path ".terraform") { Remove-Item -Recurse -Force ".terraform" }
          if (Test-Path ".terraform.lock.hcl") { Remove-Item -Force ".terraform.lock.hcl" }

          terraform init

          terraform plan `
            -var="db_admin_password=$(DB_ADMIN_PASSWORD)" `
            -var="nextauth_secret=$(NEXTAUTH_SECRET)" `
            -var="groq_api_key=$(GROQ_API_KEY)" `
            -var="gmail_user=$(GMAIL_USER)" `
            -var="gmail_app_password=$(GMAIL_APP_PASSWORD)" `
            -out=tfplan

          terraform show -no-color tfplan

    # Publish the plan file so Apply can use it
    - publish: $(workingDir)/tfplan
      artifact: tfplan-${{ parameters.environment }}
      displayName: "Publish plan artifact"

    # Publish the lock file — it is gitignored so git clean removes it between jobs
    # Apply needs the exact same lock file that was present when the plan was created
    - publish: $(workingDir)/.terraform.lock.hcl
      artifact: lockfile-${{ parameters.environment }}
      displayName: "Publish lock file artifact"

# ─── Stage 2: Approval ────────────────────────────────────────────────────────
- stage: WaitForApproval
  displayName: "Waiting for approval (${{ parameters.environment }})"
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - deployment: ApprovalGate
    displayName: "Manual approval"
    environment: ${{ parameters.environment }}-approval
    pool:
      name: local-agent
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo Approved

# ─── Stage 3: Apply ───────────────────────────────────────────────────────────
- stage: Apply
  displayName: "Terraform Apply (${{ parameters.environment }})"
  dependsOn: WaitForApproval
  condition: succeeded()
  jobs:
  - job: TerraformApply
    displayName: "Apply"
    pool:
      name: local-agent

    steps:
    - download: current
      artifact: tfplan-${{ parameters.environment }}
      displayName: "Download plan artifact"

    - download: current
      artifact: lockfile-${{ parameters.environment }}
      displayName: "Download lock file artifact"

    - task: AzureCLI@2
      displayName: "Terraform Apply"
      inputs:
        azureSubscription: azure-service-connection
        scriptType: ps
        scriptLocation: inlineScript
        workingDirectory: $(workingDir)
        addSpnToEnvironment: true
        inlineScript: |
          $env:ARM_CLIENT_ID       = $env:servicePrincipalId
          $env:ARM_CLIENT_SECRET   = $env:servicePrincipalKey
          $env:ARM_TENANT_ID       = $env:tenantId
          $env:ARM_SUBSCRIPTION_ID = (az account show --query id -o tsv)

          # Restore the lock file from Plan (git clean removed it during checkout)
          Copy-Item "$(Pipeline.Workspace)\lockfile-${{ parameters.environment }}\.terraform.lock.hcl" -Destination "."

          $planFile = "$(Pipeline.Workspace)\tfplan-${{ parameters.environment }}\tfplan"
          if (-not (Test-Path $planFile)) {
            Write-Error "Plan file not found at $planFile"
            exit 1
          }
          Copy-Item $planFile -Destination "tfplan"

          terraform apply -auto-approve tfplan
