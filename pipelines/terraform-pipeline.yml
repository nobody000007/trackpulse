trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**
      - pipelines/terraform-pipeline.yml

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod

variables:
  - group: trackpulse-secrets
  - name: workingDir
    value: $(System.DefaultWorkingDirectory)\terraform\environments\${{ parameters.environment }}
  - name: terraformVersion
    value: "1.7.0"
  - name: acrName
    value: trackpulse${{ parameters.environment }}registry

stages:

# ─── Stage 1: Terraform Plan ──────────────────────────────────────────────────
- stage: Plan
  displayName: "Terraform Plan (${{ parameters.environment }})"
  jobs:
  - job: TerraformPlan
    displayName: "Plan infrastructure changes"
    pool:
      name: local-agent

    steps:
    - task: AzureCLI@2
      displayName: "Terraform Init & Plan"
      inputs:
        azureSubscription: azure-service-connection
        scriptType: ps
        scriptLocation: inlineScript
        workingDirectory: $(workingDir)
        addSpnToEnvironment: true
        inlineScript: |
          # Install Terraform
          $url = "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_windows_amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "terraform.zip"
          Expand-Archive -Path "terraform.zip" -DestinationPath "." -Force
          $env:PATH = "$PWD;$env:PATH"
          terraform version

          # Export Azure credentials for Terraform
          $env:ARM_CLIENT_ID       = $env:servicePrincipalId
          $env:ARM_CLIENT_SECRET   = $env:servicePrincipalKey
          $env:ARM_TENANT_ID       = $env:tenantId
          $env:ARM_SUBSCRIPTION_ID = (az account show --query id -o tsv)

          # Init with remote backend
          terraform init

          # Plan
          terraform plan `
            -var="db_admin_password=$(DB_ADMIN_PASSWORD)" `
            -var="nextauth_secret=$(NEXTAUTH_SECRET)" `
            -var="groq_api_key=$(GROQ_API_KEY)" `
            -var="gmail_user=$(GMAIL_USER)" `
            -var="gmail_app_password=$(GMAIL_APP_PASSWORD)" `
            -out=tfplan

          terraform show -no-color tfplan

    - publish: $(workingDir)/tfplan
      artifact: tfplan-${{ parameters.environment }}
      displayName: "Publish plan artifact"

# ─── Stage 2: Approval Gate ───────────────────────────────────────────────────
- stage: WaitForApproval
  displayName: "Waiting for approval (${{ parameters.environment }})"
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - deployment: ApprovalGate
    displayName: "Manual approval required"
    environment: ${{ parameters.environment }}-approval
    pool:
      name: local-agent
    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo Approved

# ─── Stage 3: Terraform Apply ─────────────────────────────────────────────────
- stage: Apply
  displayName: "Terraform Apply (${{ parameters.environment }})"
  dependsOn: WaitForApproval
  condition: succeeded()
  jobs:
  - job: TerraformApply
    displayName: "Apply infrastructure changes"
    pool:
      name: local-agent

    steps:
    - download: current
      artifact: tfplan-${{ parameters.environment }}
      displayName: "Download plan artifact"

    - task: AzureCLI@2
      displayName: "Terraform Apply"
      inputs:
        azureSubscription: azure-service-connection
        scriptType: ps
        scriptLocation: inlineScript
        workingDirectory: $(workingDir)
        addSpnToEnvironment: true
        inlineScript: |
          # Install Terraform
          $url = "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_windows_amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "terraform.zip"
          Expand-Archive -Path "terraform.zip" -DestinationPath "." -Force
          $env:PATH = "$PWD;$env:PATH"

          # Export Azure credentials
          $env:ARM_CLIENT_ID       = $env:servicePrincipalId
          $env:ARM_CLIENT_SECRET   = $env:servicePrincipalKey
          $env:ARM_TENANT_ID       = $env:tenantId
          $env:ARM_SUBSCRIPTION_ID = (az account show --query id -o tsv)

          # Init
          terraform init

          # Apply the saved plan
          $planFile = "$(Pipeline.Workspace)\tfplan-${{ parameters.environment }}\tfplan"
          Write-Host "Looking for plan at: $planFile"
          if (-not (Test-Path $planFile)) {
            Write-Error "Plan file not found at $planFile"
            exit 1
          }
          Copy-Item $planFile -Destination "tfplan"
          terraform apply -auto-approve tfplan

# ─── Stage 4: Build & Push Docker Image ───────────────────────────────────────
- stage: BuildAndPush
  displayName: "Build & Push Image (${{ parameters.environment }})"
  dependsOn: Apply
  condition: succeeded()
  jobs:
  - job: Docker
    displayName: "Build and push to ACR"
    pool:
      name: local-agent

    steps:
    - task: AzureCLI@2
      displayName: "Build & Push Docker Image"
      inputs:
        azureSubscription: azure-service-connection
        scriptType: ps
        scriptLocation: inlineScript
        addSpnToEnvironment: true
        inlineScript: |
          # Login to ACR
          az acr login --name $(acrName)

          # Build and push
          docker build -t "$(acrName).azurecr.io/trackpulse:latest" .
          docker push "$(acrName).azurecr.io/trackpulse:latest"

# ─── Stage 5: Post Deploy (Migration + Restart) ───────────────────────────────
- stage: PostDeploy
  displayName: "Post Deploy (${{ parameters.environment }})"
  dependsOn: BuildAndPush
  condition: succeeded()
  jobs:
  - job: PostDeploy
    displayName: "Run migration and restart deployment"
    pool:
      name: local-agent

    steps:
    - task: AzureCLI@2
      displayName: "Migrate DB and restart app"
      inputs:
        azureSubscription: azure-service-connection
        scriptType: ps
        scriptLocation: inlineScript
        addSpnToEnvironment: true
        inlineScript: |
          # Connect kubectl to the cluster
          az aks get-credentials `
            --resource-group rg-internship-handson-sc-001 `
            --name trackpulse-${{ parameters.environment }}-aks `
            --overwrite-existing

          # Restart deployment to pull new image (init container handles migration)
          kubectl rollout restart deployment/trackpulse -n trackpulse
          kubectl rollout status deployment/trackpulse -n trackpulse --timeout=300s
