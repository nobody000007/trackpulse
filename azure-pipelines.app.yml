trigger: none

pool:
  name: linux-vm

variables:
  - group: trackpulse-vars

steps:

  - task: Docker@2
    displayName: Build and push image to ACR
    inputs:
      command: buildAndPush
      repository: trackpulse
      dockerfile: Dockerfile
      containerRegistry: acr-service-connection-new
      tags: latest
      arguments: --provenance=false

  - task: AzureWebAppContainer@1
    displayName: Deploy to App Service
    inputs:
      azureSubscription: azure-service-connection
      appName: app-trackpulse-dev
      containers: $(ACR_LOGIN_SERVER)/trackpulse:latest
